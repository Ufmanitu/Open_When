<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyisd ki, ha… 💌 Eszternek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Sacramento&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Theme variables (dark only) ──────────────────── */
:root {
  --cream:      #180e13;
  --paper:      #22131a;
  --blush:      #5a2d3a;
  --rose:       #c4788a;
  --deep:       #e8a0b0;
  --gold:       #d4a96e;
  --ink:        #f5e6ea;
  --muted:      #c4a0aa;
  --card-shadow: rgba(0,0,0,0.40);
  --card-back-shadow: rgba(0,0,0,0.50);
  --line-color:  rgba(90,45,58,0.40);
  --toggle-bg:   rgba(90,45,58,0.40);
  --toggle-border: rgba(212,169,110,0.35);
  --transition: .45s cubic-bezier(.4,0,.2,1);
}

html { scroll-behavior: smooth; }
body {
  background-color: var(--cream);
  font-family: 'Cormorant Garamond', Georgia, serif;
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background-color var(--transition), color var(--transition);
}

/* ── Top tab bar (Letters / Memories) ─────────────── */
.tab-bar {
  position: sticky;
  top: 0;
  z-index: 200;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: .9rem;
  padding: 1rem 1rem .85rem;
  background: linear-gradient(180deg, var(--cream) 70%, transparent);
}
.tab-buttons {
  grid-column: 2;
  display: flex;
  justify-content: center;
  gap: .9rem;
}
.tab-btn {
  border: 2px solid var(--gold);
  background: var(--toggle-bg);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 100px;
  padding: .75rem 1.7rem;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.15rem;
  letter-spacing: .02em;
  color: var(--ink);
  cursor: pointer;
  box-shadow: 0 6px 22px rgba(0,0,0,0.30);
  transition: transform .2s ease, background .25s ease, box-shadow .25s ease;
}
.tab-btn:hover { transform: translateY(-2px) scale(1.04); }
.tab-btn.active {
  background: linear-gradient(135deg, var(--rose), var(--deep));
  color: #1a0f13;
  font-style: normal;
  font-weight: 600;
  box-shadow: 0 8px 26px rgba(196,120,138,0.45);
}

/* ── Music manager ────────────────────────────────── */
.music-manager {
  grid-column: 1;
  justify-self: start;
  display: flex;
  align-items: center;
  gap: .5rem;
  border: 2px solid var(--gold);
  background: var(--toggle-bg);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 100px;
  padding: .4rem .7rem;
  box-shadow: 0 6px 22px rgba(0,0,0,0.30);
}
.music-btn {
  border: none;
  background: transparent;
  color: var(--ink);
  font-size: 1.05rem;
  line-height: 1;
  cursor: pointer;
  padding: .25rem;
  border-radius: 50%;
  transition: transform .2s ease, background .2s ease;
}
.music-btn:hover { transform: scale(1.15); background: rgba(212,169,110,0.18); }
.music-volume {
  width: 70px;
  accent-color: var(--rose);
  cursor: pointer;
}
@media (max-width: 480px) {
  .music-volume { width: 46px; }
}

/* ── Petals ───────────────────────────────────────── */
.petals-bg {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.petal {
  position: absolute; top: -60px;
  font-size: 1.1rem; opacity: 0;
  animation: fall linear infinite;
}
@keyframes fall {
  0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
  5%   { opacity: .7; }
  90%  { opacity: .5; }
  100% { transform: translateY(110vh) rotate(720deg) translateX(60px); opacity: 0; }
}

/* ── Hero ─────────────────────────────────────────── */
.hero {
  position: relative; z-index: 1;
  text-align: center;
  padding: 5.5rem 1rem 3rem;
}
.hero-sub {
  font-family: 'Sacramento', cursive;
  font-size: clamp(1.4rem, 4vw, 2rem);
  color: var(--rose);
  letter-spacing: .04em;
  margin-bottom: .4rem;
  animation: fadeDown .9s ease both;
  transition: color var(--transition);
}
.hero-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(2.6rem, 8vw, 5.2rem);
  color: var(--ink);
  line-height: 1.1;
  animation: fadeDown .9s .15s ease both;
  transition: color var(--transition);
}
.hero-title span {
  font-family: 'Sacramento', cursive;
  font-size: 1.15em;
  color: var(--deep);
  font-style: normal;
  transition: color var(--transition);
}
.hero-divider {
  margin: 1.6rem auto;
  width: 120px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: fadeDown .9s .3s ease both;
  transition: background var(--transition);
}
.hero-hint {
  font-size: 1rem;
  font-style: italic;
  color: var(--muted);
  letter-spacing: .05em;
  animation: fadeDown .9s .4s ease both;
  transition: color var(--transition);
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Grid ─────────────────────────────────────────── */
.grid {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.8rem;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 1.4rem 5rem;
}

/* ── Card ─────────────────────────────────────────── */
.card {
  position: relative;
  cursor: pointer;
  perspective: 900px;
  height: 320px;
  transition: transform .25s ease, filter .25s ease;
}
.card:hover { transform: translateY(-6px); filter: brightness(1.03); }
.card-inner {
  position: relative;
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform .65s cubic-bezier(.4,0,.2,1);
  border-radius: 18px;
}
.card.open .card-inner { transform: rotateY(180deg); }

.card-front, .card-back {
  position: absolute; inset: 0;
  border-radius: 18px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
}

/* Front */
.card-front {
  background: var(--paper);
  border: 1.5px solid rgba(242,196,206,0.60);
  box-shadow: 0 6px 28px var(--card-shadow);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: .6rem;
  overflow: hidden;
}
.card-front::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 0%, rgba(242,196,206,0.30) 0%, transparent 65%),
    radial-gradient(ellipse at 80% 100%, rgba(201,169,110,0.15) 0%, transparent 60%);
  pointer-events: none;
  transition: background var(--transition);
}
.envelope-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: .5rem;
}
.envelope-icon {
  font-size: 3.4rem; line-height: 1;
  transition: transform .35s ease;
  filter: drop-shadow(0 4px 8px rgba(212,137,154,0.30));
}
.card.open .envelope-icon { transform: scale(1.12) rotate(-6deg); }

.wax-seal {
  width: 34px; height: 34px;
  background: radial-gradient(circle at 38% 38%, #e8697a, var(--deep));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .95rem;
  box-shadow: 0 3px 10px rgba(158,95,110,0.40);
  transition: transform .35s ease;
  color: #fff;
}
.card.open .wax-seal { transform: scale(1.18); }

.card-label {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem; font-style: italic;
  color: var(--ink);
  text-align: center;
  padding: 0 1.2rem; line-height: 1.4;
  transition: color var(--transition);
}
.card-label-open {
  font-family: 'Sacramento', cursive;
  font-size: 1.55rem;
  color: var(--deep);
  line-height: 1.3; text-align: center;
  padding: 0 .8rem;
  transition: color var(--transition);
}

/* Back */
.card-back {
  background: var(--paper);
  transform: rotateY(180deg);
  border: 1.5px solid rgba(201,169,110,0.40);
  box-shadow: 0 10px 40px var(--card-back-shadow);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.6rem 1.4rem 1.4rem;
  gap: .65rem; overflow: hidden;
}
.card-back::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    transparent, transparent 27px,
    var(--line-color) 28px
  );
  pointer-events: none; border-radius: 18px;
  transition: background var(--transition);
}
.card-back::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 6px;
  background: linear-gradient(90deg, var(--rose), var(--gold), var(--rose));
  border-radius: 0 0 18px 18px;
  opacity: .6;
}
.letter-emoji { font-size: 1.6rem; line-height: 1; }
.letter-text {
  font-size: .97rem; line-height: 1.65;
  text-align: center; color: var(--ink);
  font-style: italic; position: relative; z-index: 1;
  transition: color var(--transition);
}
.letter-sign {
  font-family: 'Sacramento', cursive;
  font-size: 1.35rem; color: var(--deep);
  position: relative; z-index: 1; margin-top: .2rem;
  transition: color var(--transition);
}

/* ── Footer ───────────────────────────────────────── */
.footer {
  position: relative; z-index: 1;
  text-align: center;
  padding: 1.5rem 1rem 3rem;
  font-family: 'Sacramento', cursive;
  font-size: 1.5rem; color: var(--rose);
  animation: pulse 3s ease-in-out infinite;
  transition: color var(--transition);
}
@keyframes pulse { 0%,100% { opacity: .7; } 50% { opacity: 1; } }

/* ── Sparkle ──────────────────────────────────────── */
.sparkle {
  position: fixed; pointer-events: none; z-index: 200;
  font-size: 1.1rem;
  animation: sparkleAnim .75s ease forwards;
}
@keyframes sparkleAnim {
  0%   { opacity: 1; transform: translate(0,0) scale(1.2); }
  100% { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(.3); }
}

/* ── Memories gallery ─────────────────────────────── */
.memory-card {
  position: relative;
  background: var(--paper);
  border: 1.5px solid rgba(242,196,206,0.60);
  border-radius: 18px;
  box-shadow: 0 6px 28px var(--card-shadow);
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: transform .25s ease, filter .25s ease, background var(--transition), border-color var(--transition), box-shadow var(--transition);
}
.memory-card:hover { transform: translateY(-6px); filter: brightness(1.03); }
.memory-photo {
  width: 100%; aspect-ratio: 1 / 1;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  background: linear-gradient(135deg, var(--blush), var(--gold));
}
.memory-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.memory-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: .4rem;
  color: #fff; opacity: .9;
}
.memory-placeholder .ph-icon { font-size: 2.1rem; }
.memory-placeholder .ph-text {
  font-size: .78rem; font-style: italic; letter-spacing: .03em;
  text-align: center; padding: 0 .8rem;
}

/* ── Responsive ───────────────────────────────────── */
@media (max-width: 480px) {
  .tab-bar {
    grid-template-columns: 1fr;
    justify-items: center;
    gap: .6rem;
    padding: .8rem .6rem .65rem;
  }
  .music-manager { grid-column: 1; justify-self: center; }
  .tab-buttons { grid-column: 1; }
  .tab-btn { padding: .6rem 1.1rem; font-size: 1rem; }
}
</style>
</head>
<body>

<div class="petals-bg" id="petals"></div>

<!-- Top tab bar -->
<div class="tab-bar" id="tabBar">
  <div class="music-manager" id="musicManager">
    <button class="music-btn" id="musicPlayBtn" onclick="toggleMusicPlay()" title="Zene lejátszása / szüneteltetése">▶️</button>
    <button class="music-btn" id="musicMuteBtn" onclick="toggleMusicMute()" title="Némítás">🔊</button>
    <input type="range" class="music-volume" id="musicVolume" min="0" max="1" step="0.01" value="0.55"
           oninput="setMusicVolume(this.value)" title="Hangerő">
  </div>
  <div class="tab-buttons">
    <button class="tab-btn active" id="tabLetters" onclick="showMain()">📖 Levelek</button>
    <button class="tab-btn" id="tabMemories" onclick="showMemories()">💕 Emlékeink</button>
  </div>
</div>

<div id="mainView">
  <!-- Hero -->
  <header class="hero">
    <p class="hero-sub" id="heroSub"></p>
    <h1 class="hero-title" id="heroTitle"></h1>
    <div class="hero-divider"></div>
    <p class="hero-hint" id="heroHint"></p>
  </header>

  <main class="grid" id="grid"></main>
  <footer class="footer" id="footerText"></footer>
</div>

<!-- Hidden "our memories" view – only revealed after the birthday letter is opened & closed once -->
<div id="memoriesView" style="display:none;">
  <header class="hero">
    <p class="hero-sub" id="memSub"></p>
    <h1 class="hero-title" id="memTitle"></h1>
    <div class="hero-divider"></div>
    <p class="hero-hint" id="memHint"></p>
  </header>

  <main class="grid memories-grid" id="memoriesGrid"></main>

  <footer class="footer" id="memFooterText"></footer>
</div>


<script>
/* ── i18n strings ─────────────────────────────────── */
const i18n = {
  heroSub:   'egy apró meglepetés neked 💌',
  heroTitle: 'Nyisd ki, ha…<br><span>Eszternek</span>',
  heroHint:  'Nyisd ki a leveleket',
  hintMouse: ' – húzd fölé az egeret 🖱',
  hintTouch: ' – koppints rájuk 👆',
  footer:    'Szeretlek ✦ mindig ✦ minden pillanatban 🌸',
  memSub:    'a mi kis történetünk 💕',
  memTitle:  'Emlékeink<br><span>kettőnké</span>',
  memHint:   'Ezek a pillanatok mindig velünk maradnak',
  memFooter: 'És még annyi közös emlék vár ránk… 🌸',
  phText:    'ide kerül egy fotó',
};

/* ── Letter data ──────────────────────────────────── */
const letters = [
  {
    emoji:'😊', seal:'🌟', topEmoji:'✨',
    front: 'Nyisd ki, ha<br><em>boldog vagy</em>',
    text: 'Ez az a ragyogás, amiért annyira szeretlek. Őrizd meg ezt az érzést – írd le, fotózd le, éld meg teljes szívvel. Te tényleg megérdemled a világ összes örömét. 🎉',
    sign: '– a legnagyobb rajongód',
  },
  {
    emoji:'😢', seal:'💙', topEmoji:'🌧️',
    front: 'Nyisd ki, ha<br><em>szomorú vagy</em>',
    text: 'Tudom, hogy most nehéz. De minden vihar egyszer elvonul, és te vagy az egyik legerősebb ember, akit ismerek. Engedd ki a könnyeidet, aztán emlékezz: én itt vagyok veled, mindig. Bízz bennem, minden rendben lesz. 🌤️',
    sign: '– aki nagyon szeret téged',
  },
  {
    emoji:'🥺', seal:'💗', topEmoji:'🌙',
    front: 'Nyisd ki, ha<br><em>hiányzom neked</em>',
    // FIX: "Én is hiányzol" → "Nekem is hiányzol" (az "Én is" + "hiányzol" grammatikailag összeférhetetlen volt)
    text: 'Nekem is nagyon hiányzol. Csukd be a szemed, és érezd: valahol épp most is rád gondolok. A távolság csak egy szám – a szívem mindig melletted van. Hamarosan ott leszek. ✈️',
    sign: '– a te embered',
  },
  {
    emoji:'🤗', seal:'🩷', topEmoji:'🫶',
    front: 'Nyisd ki, ha<br><em>ölelésre vágysz</em>',
    text: 'Képzeld el, hogy most átölellek. Szorosan. Köréd fonom a karom, és nem engedlek el, amíg jobb nem lesz. Addig is: takaró, meleg tea és a kedvenc sorozatod. Hamarosan élőben is megölellek. 🧸',
    sign: '– aki messziről ölel',
  },
  {
    emoji:'😴', seal:'🌛', topEmoji:'⭐',
    front: 'Nyisd ki, ha<br><em>nem tudsz aludni</em>',
    text: 'Lélegezz lassan. Be… ki… Képzeld azt, hogy szorosan összebújunk és a füledbe szuszogok. Gondolj arra a napra, amikor először nevettünk annyit, hogy fájt a hasunk. Mosolyogj rá halkan, és hagyd, hogy az álom szépen elringasson. 💤',
    sign: '– aki szép álmokat küld',
  },
  {
    emoji:'💪', seal:'🔥', topEmoji:'🚀',
    front: 'Nyisd ki, ha<br><em>motivációra van szükséged</em>',
    text: 'Képes vagy rá. Nem csak beszélek: láttam, ahogy megküzdesz a nehézségekkel. Ezen is át fogsz jutni. Állj fel, rázd meg magad, és tedd meg az első lépést. Büszke vagyok rád. 🏆',
    sign: '– a te szurkolód',
  },
  {
    emoji:'😤', seal:'🕊️', topEmoji:'🌬️',
    front: 'Nyisd ki, ha<br><em>mérges vagy</em>',
    text: 'Rendben, most dühös vagy. Ez teljesen emberi. Érezd, hogy átjár, aztán vegyél egy mély levegőt. Mielőtt reagálsz, kérdezd meg magadtól: egy hét múlva is számítani fog? Ha igen, beszéljük meg. Ha nem, engedd el. ❤️',
    sign: '– aki veled van, még dühösen is',
  },
  {
    emoji:'😑', seal:'🎨', topEmoji:'🌈',
    front: 'Nyisd ki, ha<br><em>unatkozol</em>',
    // FIX: "a jövőbeli önödnek" → "jövőbeli önmagadnak" (az "önöd" magázó/többes szám volt)
    text: 'Ötletek: ① Rajzolj valamit, ami ma eszedbe jutott. ② Írj egy rövid levelet a jövőbeli önmagadnak. <br> ③ Hívj fel, hátha ellérsz és el tudom mondani, mennnnnnnnnnyire szeretlek❤️ 🗺️',
    sign: '– a tervező',
  },
  {
    emoji:'🌸', seal:'💫', topEmoji:'👑',
    front: 'Nyisd ki, ha<br><em>gyönyörűnek érzed magad</em>, és akkor is ha épp nem - hiszen te mindig gyönyörű vagy!',
    // FIX: "elbűvölök tőled" → "elbűvölsz engem" (az "elbűvöl" tárgyas ige, a korábbi forma fordítva állt)
    text: 'IGEN! Igen, igen, igen. Mert ez nem csak ma igaz rád. A szemed, a mosolyod, Te Bombanőőő! Minden nap elbűvölsz. Őrizd meg ezt az érzést. 🌺',
    sign: '– aki tényleg lát téged',
  },
  {
    emoji:'🌟', seal:'✉️', topEmoji:'😄',
    front: 'Nyisd ki, ha<br><em>mosolyra van szükséged</em>',
    // FIX: az eredeti lift/lépcső vicc értelmetlen volt magyarul. Helyette egy valódi magyar szójáték:
    // "Mit mond a bal szem a jobb szemnek? »Köztünk szólva, te is látod ezt?«"
    // — a "köztünk szólva" idiómában az "köztünk" szó szó szerint is igaz (az orr köztük van).
    text: 'Mit mond a bal szem a jobb szemnek? „Köztünk szólva, te is látod ezt?” 😄 Jó, jó – de komolyan: olyan cuki arccal olvasod ezt, hogy egyszerűen nem lehet nem mosolyogni rajtad. Na, meg is van a mosoly! 🎊',
    sign: '– a rosszvicc-mestere',
  },
  {
    emoji:'💭', seal:'🦋', topEmoji:'🧭',
    front: 'Nyisd ki, ha<br><em>elveszettnek érzed magad</em>',
    // FIX: "növekedésben vagy" → "épp fejlődsz" (a korábbi szerkezet magyartalan volt)
    text: 'Az elveszettség sokszor csak azt jelzi, hogy éppen fejlődsz. Nem kell most mindent tudnod. Lélegezz, bízz magadban – és ha kell, szólj nekem. Együtt megtaláljuk az utat. 🌿',
    sign: '– aki melletted megy',
  },
  {
    id: 'birthday',
    emoji:'🎂', seal:'🎁', topEmoji:'🥳',
    // FIX: "a születésnapodon van" → "ma a születésnapod van" (az ige alanya hiányzott)
    front: 'Nyisd ki, ha<br><em>ma van a születésnapod</em>',
    text: 'Boldog születésnapot, gyönyörű! 🎉 Ma minden rólad szól – a torta, a gyertyák, a kívánságok, minden. Kívánom neked az összes jót ezen a világon. Mert megérdemled. Szeretlek picim.❤️ 🎈',
    sign: '– a te legnagyobb rajongód',
  },
];

/* ── Detect touch ─────────────────────────────────── */
const isTouch = !window.matchMedia('(pointer: fine)').matches;

/* ── "Our memories" gallery data ──────────────────────
   Photos are embedded directly in this file (base64), so the page
   works as a single file with no separate photos folder needed. */
const memories = [

/* ── Render hero ──────────────────────────────────── */
function renderHero() {
  const t = i18n;
  document.getElementById('heroSub').innerHTML   = t.heroSub;
  document.getElementById('heroTitle').innerHTML = t.heroTitle;
  document.getElementById('heroHint').innerHTML  = t.heroHint + (isTouch ? t.hintTouch : t.hintMouse);
  document.getElementById('footerText').textContent = t.footer;
}

/* ── Render cards ─────────────────────────────────── */
/* ── Background music ─────────────────────────────────── */
let musicEverPlayed = false;

function playBgMusic() {
  const audio = document.getElementById('bgMusic');
  if (!audio) return;
  if (audio.paused) {
    audio.volume = Number(document.getElementById('musicVolume')?.value ?? 0.55);
    audio.play().catch(() => {}); // silently ignore if blocked
  }
}

function toggleMusicPlay() {
  const audio = document.getElementById('bgMusic');
  if (!audio) return;
  if (audio.paused) {
    playBgMusic();
  } else {
    audio.pause();
  }
}

function toggleMusicMute() {
  const audio = document.getElementById('bgMusic');
  if (!audio) return;
  audio.muted = !audio.muted;
  updateMusicUI();
}

function setMusicVolume(v) {
  const audio = document.getElementById('bgMusic');
  if (!audio) return;
  audio.volume = Number(v);
  if (audio.volume > 0) audio.muted = false;
  updateMusicUI();
}

function updateMusicUI() {
  const audio    = document.getElementById('bgMusic');
  const playBtn  = document.getElementById('musicPlayBtn');
  const muteBtn  = document.getElementById('musicMuteBtn');
  if (!audio || !playBtn || !muteBtn) return;
  playBtn.textContent = audio.paused ? '▶️' : '⏸️';
  muteBtn.textContent = (audio.muted || audio.volume === 0) ? '🔇' : '🔊';
}

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const t = i18n;

  letters.forEach((l) => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">
          <div class="envelope-wrap">
            <div class="envelope-icon">💌</div>
            <div class="wax-seal">${l.seal}</div>
          </div>
          <div class="card-label-open">${l.emoji}</div>
          <div class="card-label">${l.front}</div>
        </div>
        <div class="card-back">
          <div class="letter-emoji">${l.topEmoji}</div>
          <p class="letter-text">${l.text}</p>
          <div class="letter-sign">${l.sign}</div>
        </div>
      </div>`;

    if (isTouch) {
      card.addEventListener('click', () => {
        const wasOpen = card.classList.contains('open');
        card.classList.toggle('open', !wasOpen);
        if (!wasOpen) spawnSparkles(card);
      });
    } else {
      card.addEventListener('mouseenter', () => card.classList.add('open'));
      card.addEventListener('mouseleave', () => card.classList.remove('open'));
    }

    grid.appendChild(card);
  });
}

/* ── Memories tab ──────────────────────────────────── */
function renderMemories() {
  const t = i18n;
  document.getElementById('memSub').innerHTML        = t.memSub;
  document.getElementById('memTitle').innerHTML      = t.memTitle;
  document.getElementById('memHint').textContent     = t.memHint;
  document.getElementById('memFooterText').textContent = t.memFooter;

  const grid = document.getElementById('memoriesGrid');
  grid.innerHTML = '';
  memories.forEach((m) => {
    const card = document.createElement('div');
    card.className = 'memory-card';
    card.innerHTML = `
      <div class="memory-photo">
        ${m.img
          ? `<img src="${m.img}" alt="">`
          : `<div class="memory-placeholder"><span class="ph-icon">📷</span><span class="ph-text">${t.phText}</span></div>`}
      </div>`;
    grid.appendChild(card);
  });
}

function showMemories() {
  document.getElementById('mainView').style.display     = 'none';
  document.getElementById('memoriesView').style.display  = 'block';
  document.getElementById('tabLetters').classList.remove('active');
  document.getElementById('tabMemories').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (!musicEverPlayed) playBgMusic();
}

function showMain() {
  document.getElementById('memoriesView').style.display = 'none';
  document.getElementById('mainView').style.display     = 'block';
  document.getElementById('tabMemories').classList.remove('active');
  document.getElementById('tabLetters').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── Sparkles ─────────────────────────────────────── */
function spawnSparkles(card) {
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  const glyphs = ['✨','💖','🌸','⭐','💫','🌟','🩷','🌺','💕'];
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
    const angle = (i / 10) * 2 * Math.PI + Math.random() * .4;
    const dist  = 55 + Math.random() * 55;
    s.style.setProperty('--tx', `${Math.cos(angle)*dist}px`);
    s.style.setProperty('--ty', `${Math.sin(angle)*dist}px`);
    s.style.left  = `${cx}px`;
    s.style.top   = `${cy}px`;
    s.style.animationDelay = `${Math.random() * .1}s`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}

/* ── Floating petals ──────────────────────────────── */
const petalBox    = document.getElementById('petals');
const petalGlyphs = ['🌸','🌺','💮','🌷','✿','❀','🩷','💕','🌼','✨'];
function makePetal() {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = petalGlyphs[Math.floor(Math.random() * petalGlyphs.length)];
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (6 + Math.random() * 10) + 's';
  p.style.animationDelay    = (Math.random() * 8) + 's';
  p.style.fontSize = (.65 + Math.random() * .8) + 'rem';
  petalBox.appendChild(p);
  setTimeout(() => p.remove(), 20000);
}
for (let i = 0; i < 22; i++) setTimeout(makePetal, i * 380);
setInterval(makePetal, 1700);

/* ── Init ─────────────────────────────────────────── */
renderHero();
renderCards();
renderMemories();

document.addEventListener('DOMContentLoaded', () => {
  const bgMusicEl = document.getElementById('bgMusic');
  ['play', 'pause', 'volumechange'].forEach(ev => bgMusicEl.addEventListener(ev, updateMusicUI));
  bgMusicEl.addEventListener('play', () => { musicEverPlayed = true; });
  updateMusicUI();

  // Try to start music right away; if the browser blocks silent
  // autoplay, opening the Memories tab will start it once instead.
  playBgMusic();
});
</script>
