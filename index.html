<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyisd ki, ha… 💌 Eszternek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Sacramento&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Theme variables (dark only) ──────────────────── */
:root {
  --cream:      #180e13;
  --paper:      #22131a;
  --blush:      #5a2d3a;
  --rose:       #c4788a;
  --deep:       #e8a0b0;
  --gold:       #d4a96e;
  --ink:        #f5e6ea;
  --muted:      #c4a0aa;
  --card-shadow: rgba(0,0,0,0.40);
  --card-back-shadow: rgba(0,0,0,0.50);
  --line-color:  rgba(90,45,58,0.40);
  --toggle-bg:   rgba(90,45,58,0.40);
  --toggle-border: rgba(212,169,110,0.35);
  --transition: .45s cubic-bezier(.4,0,.2,1);
}

html { scroll-behavior: smooth; }
body {
  background-color: var(--cream);
  font-family: 'Cormorant Garamond', Georgia, serif;
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background-color var(--transition), color var(--transition);
}

/* ── Top tab bar (Letters / Memories) ─────────────── */
.tab-bar {
  position: sticky;
  top: 0;
  z-index: 200;
  display: flex;
  justify-content: center;
  gap: .9rem;
  padding: 1rem 1rem .85rem;
  background: linear-gradient(180deg, var(--cream) 70%, transparent);
}
.tab-btn {
  border: 2px solid var(--gold);
  background: var(--toggle-bg);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 100px;
  padding: .75rem 1.7rem;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.15rem;
  letter-spacing: .02em;
  color: var(--ink);
  cursor: pointer;
  box-shadow: 0 6px 22px rgba(0,0,0,0.30);
  transition: transform .2s ease, background .25s ease, box-shadow .25s ease;
}
.tab-btn:hover { transform: translateY(-2px) scale(1.04); }
.tab-btn.active {
  background: linear-gradient(135deg, var(--rose), var(--deep));
  color: #1a0f13;
  font-style: normal;
  font-weight: 600;
  box-shadow: 0 8px 26px rgba(196,120,138,0.45);
}

/* ── Petals ───────────────────────────────────────── */
.petals-bg {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.petal {
  position: absolute; top: -60px;
  font-size: 1.1rem; opacity: 0;
  animation: fall linear infinite;
}
@keyframes fall {
  0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
  5%   { opacity: .7; }
  90%  { opacity: .5; }
  100% { transform: translateY(110vh) rotate(720deg) translateX(60px); opacity: 0; }
}

/* ── Hero ─────────────────────────────────────────── */
.hero {
  position: relative; z-index: 1;
  text-align: center;
  padding: 5.5rem 1rem 3rem;
}
.hero-sub {
  font-family: 'Sacramento', cursive;
  font-size: clamp(1.4rem, 4vw, 2rem);
  color: var(--rose);
  letter-spacing: .04em;
  margin-bottom: .4rem;
  animation: fadeDown .9s ease both;
  transition: color var(--transition);
}
.hero-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(2.6rem, 8vw, 5.2rem);
  color: var(--ink);
  line-height: 1.1;
  animation: fadeDown .9s .15s ease both;
  transition: color var(--transition);
}
.hero-title span {
  font-family: 'Sacramento', cursive;
  font-size: 1.15em;
  color: var(--deep);
  font-style: normal;
  transition: color var(--transition);
}
.hero-divider {
  margin: 1.6rem auto;
  width: 120px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: fadeDown .9s .3s ease both;
  transition: background var(--transition);
}
.hero-hint {
  font-size: 1rem;
  font-style: italic;
  color: var(--muted);
  letter-spacing: .05em;
  animation: fadeDown .9s .4s ease both;
  transition: color var(--transition);
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Grid ─────────────────────────────────────────── */
.grid {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.8rem;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 1.4rem 5rem;
}

/* ── Card ─────────────────────────────────────────── */
.card {
  position: relative;
  cursor: pointer;
  perspective: 900px;
  height: 320px;
  transition: transform .25s ease, filter .25s ease;
}
.card:hover { transform: translateY(-6px); filter: brightness(1.03); }
.card-inner {
  position: relative;
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform .65s cubic-bezier(.4,0,.2,1);
  border-radius: 18px;
}
.card.open .card-inner { transform: rotateY(180deg); }

.card-front, .card-back {
  position: absolute; inset: 0;
  border-radius: 18px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
}

/* Front */
.card-front {
  background: var(--paper);
  border: 1.5px solid rgba(242,196,206,0.60);
  box-shadow: 0 6px 28px var(--card-shadow);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: .6rem;
  overflow: hidden;
}
.card-front::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 0%, rgba(242,196,206,0.30) 0%, transparent 65%),
    radial-gradient(ellipse at 80% 100%, rgba(201,169,110,0.15) 0%, transparent 60%);
  pointer-events: none;
  transition: background var(--transition);
}
.envelope-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: .5rem;
}
.envelope-icon {
  font-size: 3.4rem; line-height: 1;
  transition: transform .35s ease;
  filter: drop-shadow(0 4px 8px rgba(212,137,154,0.30));
}
.card.open .envelope-icon { transform: scale(1.12) rotate(-6deg); }

.wax-seal {
  width: 34px; height: 34px;
  background: radial-gradient(circle at 38% 38%, #e8697a, var(--deep));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .95rem;
  box-shadow: 0 3px 10px rgba(158,95,110,0.40);
  transition: transform .35s ease;
  color: #fff;
}
.card.open .wax-seal { transform: scale(1.18); }

.card-label {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem; font-style: italic;
  color: var(--ink);
  text-align: center;
  padding: 0 1.2rem; line-height: 1.4;
  transition: color var(--transition);
}
.card-label-open {
  font-family: 'Sacramento', cursive;
  font-size: 1.55rem;
  color: var(--deep);
  line-height: 1.3; text-align: center;
  padding: 0 .8rem;
  transition: color var(--transition);
}

/* Back */
.card-back {
  background: var(--paper);
  transform: rotateY(180deg);
  border: 1.5px solid rgba(201,169,110,0.40);
  box-shadow: 0 10px 40px var(--card-back-shadow);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.6rem 1.4rem 1.4rem;
  gap: .65rem; overflow: hidden;
}
.card-back::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    transparent, transparent 27px,
    var(--line-color) 28px
  );
  pointer-events: none; border-radius: 18px;
  transition: background var(--transition);
}
.card-back::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 6px;
  background: linear-gradient(90deg, var(--rose), var(--gold), var(--rose));
  border-radius: 0 0 18px 18px;
  opacity: .6;
}
.letter-emoji { font-size: 1.6rem; line-height: 1; }
.letter-text {
  font-size: .97rem; line-height: 1.65;
  text-align: center; color: var(--ink);
  font-style: italic; position: relative; z-index: 1;
  transition: color var(--transition);
}
.letter-sign {
  font-family: 'Sacramento', cursive;
  font-size: 1.35rem; color: var(--deep);
  position: relative; z-index: 1; margin-top: .2rem;
  transition: color var(--transition);
}

/* ── Footer ───────────────────────────────────────── */
.footer {
  position: relative; z-index: 1;
  text-align: center;
  padding: 1.5rem 1rem 3rem;
  font-family: 'Sacramento', cursive;
  font-size: 1.5rem; color: var(--rose);
  animation: pulse 3s ease-in-out infinite;
  transition: color var(--transition);
}
@keyframes pulse { 0%,100% { opacity: .7; } 50% { opacity: 1; } }

/* ── Sparkle ──────────────────────────────────────── */
.sparkle {
  position: fixed; pointer-events: none; z-index: 200;
  font-size: 1.1rem;
  animation: sparkleAnim .75s ease forwards;
}
@keyframes sparkleAnim {
  0%   { opacity: 1; transform: translate(0,0) scale(1.2); }
  100% { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(.3); }
}

/* ── Locked birthday card ─────────────────────────── */
.card.locked-card { cursor: not-allowed; }
.card.locked-card:hover { transform: none; filter: none; }
.lock-badge {
  position: absolute; top: .7rem; right: .9rem;
  font-size: 1.05rem; opacity: .65;
}
.locked-front { opacity: .93; }
.locked-countdown {
  font-size: .76rem; color: var(--muted);
  letter-spacing: .03em; font-style: italic;
  margin-top: .1rem; padding: 0 1rem; text-align: center;
  transition: color var(--transition);
}
@keyframes shakeAnim {
  0%, 100% { transform: translateX(0) rotate(0); }
  20% { transform: translateX(-7px) rotate(-1.2deg); }
  40% { transform: translateX(7px) rotate(1.2deg); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}
.card.shake .card-inner { animation: shakeAnim .45s ease; }

/* ── Tab bar reveal animation ──────────────────────── */
@keyframes tabPop {
  0%   { transform: scale(0) translateY(-30px); opacity: 0; }
  55%  { transform: scale(1.08) translateY(4px); opacity: 1; }
  100% { transform: scale(1) translateY(0); }
}
.tab-bar.tab-reveal .tab-btn { animation: tabPop .65s cubic-bezier(.34,1.56,.64,1); }

/* ── Memories gallery ─────────────────────────────── */
.memory-card {
  position: relative;
  background: var(--paper);
  border: 1.5px solid rgba(242,196,206,0.60);
  border-radius: 18px;
  box-shadow: 0 6px 28px var(--card-shadow);
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: transform .25s ease, filter .25s ease, background var(--transition), border-color var(--transition), box-shadow var(--transition);
}
.memory-card:hover { transform: translateY(-6px); filter: brightness(1.03); }
.memory-photo {
  width: 100%; aspect-ratio: 4 / 3;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  background: linear-gradient(135deg, var(--blush), var(--gold));
}
.memory-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.memory-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: .4rem;
  color: #fff; opacity: .9;
}
.memory-placeholder .ph-icon { font-size: 2.1rem; }
.memory-placeholder .ph-text {
  font-size: .78rem; font-style: italic; letter-spacing: .03em;
  text-align: center; padding: 0 .8rem;
}
.memory-caption {
  font-size: .95rem; line-height: 1.55; font-style: italic;
  text-align: center; color: var(--ink);
  padding: .9rem 1rem .2rem;
  transition: color var(--transition);
}
.memory-date {
  font-family: 'Sacramento', cursive;
  font-size: 1.1rem; color: var(--deep);
  text-align: center; padding: .2rem 1rem 1rem;
  transition: color var(--transition);
}

/* ── Popup modal ──────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(74,44,53,0.55);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 1.2rem;
  animation: overlayFade .3s ease;
}
@keyframes overlayFade { from { opacity: 0; } to { opacity: 1; } }
.modal-card {
  background: var(--paper);
  border: 2px solid var(--gold);
  border-radius: 24px;
  padding: 2.6rem 2rem 2.2rem;
  max-width: 420px; width: 100%;
  text-align: center;
  box-shadow: 0 24px 70px rgba(0,0,0,0.40);
  animation: modalPop .45s cubic-bezier(.34,1.56,.64,1);
  transition: background var(--transition), border-color var(--transition);
}
@keyframes modalPop {
  from { transform: scale(.7); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.modal-emoji { font-size: 3.4rem; margin-bottom: .7rem; animation: pulse 2s ease-in-out infinite; }
.modal-title {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 1.55rem; color: var(--ink);
  margin-bottom: .8rem; line-height: 1.3;
  transition: color var(--transition);
}
.modal-text {
  font-size: 1.05rem; color: var(--muted); line-height: 1.65;
  margin-bottom: 1.6rem;
  transition: color var(--transition);
}
.modal-btn {
  background: linear-gradient(135deg, var(--rose), var(--deep));
  color: #fff; border: none; border-radius: 100px;
  padding: .75rem 1.9rem;
  font-family: 'Cormorant Garamond', serif; font-size: 1.08rem;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(158,95,110,0.35);
  transition: transform .2s ease;
}
.modal-btn:hover { transform: scale(1.06); }

/* ── Responsive ───────────────────────────────────── */
@media (max-width: 480px) {
  .tab-bar { gap: .5rem; padding: .8rem .6rem .65rem; }
  .tab-btn { padding: .6rem 1.1rem; font-size: 1rem; }
}
</style>
</head>
<body>

<div class="petals-bg" id="petals"></div>

<!-- Big top tab bar — hidden until the birthday letter has been opened once on/after 2026.06.26, then stays visible forever -->
<div class="tab-bar" id="tabBar" style="display:none;">
  <button class="tab-btn active" id="tabLetters" onclick="showMain()">📖 Levelek</button>
  <button class="tab-btn" id="tabMemories" onclick="showMemories()">💕 Emlékeink</button>
</div>

<div id="mainView">
  <!-- Hero -->
  <header class="hero">
    <p class="hero-sub" id="heroSub"></p>
    <h1 class="hero-title" id="heroTitle"></h1>
    <div class="hero-divider"></div>
    <p class="hero-hint" id="heroHint"></p>
  </header>

  <main class="grid" id="grid"></main>
  <footer class="footer" id="footerText"></footer>
</div>

<!-- Hidden "our memories" view – only revealed after the birthday letter is opened & closed once -->
<div id="memoriesView" style="display:none;">
  <header class="hero">
    <p class="hero-sub" id="memSub"></p>
    <h1 class="hero-title" id="memTitle"></h1>
    <div class="hero-divider"></div>
    <p class="hero-hint" id="memHint"></p>
  </header>

  <main class="grid memories-grid" id="memoriesGrid"></main>

  <footer class="footer" id="memFooterText"></footer>
</div>

<!-- Popup shown the first time the birthday letter is closed (after the unlock date) -->
<div class="modal-overlay" id="popupOverlay" style="display:none;">
  <div class="modal-card">
    <div class="modal-emoji">💕</div>
    <h2 class="modal-title" id="popupTitle"></h2>
    <p class="modal-text" id="popupText"></p>
    <button class="modal-btn" id="popupBtn" onclick="goToMemoriesFromPopup()"></button>
  </div>
</div>


<script>
/* ── i18n strings ─────────────────────────────────── */
const i18n = {
  heroSub:   'egy apró meglepetés neked 💌',
  heroTitle: 'Nyisd ki, ha…<br><span>Eszternek</span>',
  heroHint:  'Nyisd ki a leveleket',
  hintMouse: ' – húzd fölé az egeret 🖱',
  hintTouch: ' – koppints rájuk 👆',
  footer:    'Szeretlek ✦ mindig ✦ minden pillanatban 🌸',
  memSub:    'a mi kis történetünk 💕',
  memTitle:  'Emlékeink<br><span>kettőnké</span>',
  memHint:   'Ezek a pillanatok mindig velünk maradnak',
  memFooter: 'És még annyi közös emlék vár ránk… 🌸',
  phText:    'ide kerül egy fotó',
  popupTitle:'Egy új meglepetés vár rád! 💕',
  popupText: 'Most nyílt egy titkos fül… nézd meg, mit rejt! 🌸',
  popupBtn:  'Megnézem! ✨',
  lockedUntil: '🔒 Zárva eddig: 2026. 06. 26.',
  lockedDays:  (d) => `még ${d} nap`,
};

/* ── Letter data ──────────────────────────────────── */
const letters = [
  {
    emoji:'😊', seal:'🌟', topEmoji:'✨',
    front: 'Nyisd ki, ha<br><em>boldog vagy</em>',
    text: 'Ez az a ragyogás, amiért annyira szeretlek. Őrizd meg ezt az érzést – írd le, fotózd le, éld meg teljes szívvel. Te tényleg megérdemled a világ összes örömét. 🎉',
    sign: '– a legnagyobb rajongód',
  },
  {
    emoji:'😢', seal:'💙', topEmoji:'🌧️',
    front: 'Nyisd ki, ha<br><em>szomorú vagy</em>',
    text: 'Tudom, hogy most nehéz. De minden vihar egyszer elvonul, és te vagy az egyik legerősebb ember, akit ismerek. Engedd ki a könnyeidet, aztán emlékezz: én itt vagyok veled, mindig. Bízz bennem, minden rendben lesz. 🌤️',
    sign: '– aki nagyon szeret téged',
  },
  {
    emoji:'🥺', seal:'💗', topEmoji:'🌙',
    front: 'Nyisd ki, ha<br><em>hiányzom neked</em>',
    // FIX: "Én is hiányzol" → "Nekem is hiányzol" (az "Én is" + "hiányzol" grammatikailag összeférhetetlen volt)
    text: 'Nekem is nagyon hiányzol. Csukd be a szemed, és érezd: valahol épp most is rád gondolok. A távolság csak egy szám – a szívem mindig melletted van. Hamarosan ott leszek. ✈️',
    sign: '– a te embered',
  },
  {
    emoji:'🤗', seal:'🩷', topEmoji:'🫶',
    front: 'Nyisd ki, ha<br><em>ölelésre vágysz</em>',
    text: 'Képzeld el, hogy most átölellek. Szorosan. Köréd fonom a karom, és nem engedlek el, amíg jobb nem lesz. Addig is: takaró, meleg tea és a kedvenc sorozatod. Hamarosan élőben is megölellek. 🧸',
    sign: '– aki messziről ölel',
  },
  {
    emoji:'😴', seal:'🌛', topEmoji:'⭐',
    front: 'Nyisd ki, ha<br><em>nem tudsz aludni</em>',
    text: 'Lélegezz lassan. Be… ki… Képzeld azt, hogy szorosan összebújunk és a füledbe szuszogok. Gondolj arra a napra, amikor először nevettünk annyit, hogy fájt a hasunk. Mosolyogj rá halkan, és hagyd, hogy az álom szépen elringasson. 💤',
    sign: '– aki szép álmokat küld',
  },
  {
    emoji:'💪', seal:'🔥', topEmoji:'🚀',
    front: 'Nyisd ki, ha<br><em>motivációra van szükséged</em>',
    text: 'Képes vagy rá. Nem csak beszélek: láttam, ahogy megküzdesz a nehézségekkel. Ezen is át fogsz jutni. Állj fel, rázd meg magad, és tedd meg az első lépést. Büszke vagyok rád. 🏆',
    sign: '– a te szurkolód',
  },
  {
    emoji:'😤', seal:'🕊️', topEmoji:'🌬️',
    front: 'Nyisd ki, ha<br><em>mérges vagy</em>',
    text: 'Rendben, most dühös vagy. Ez teljesen emberi. Érezd, hogy átjár, aztán vegyél egy mély levegőt. Mielőtt reagálsz, kérdezd meg magadtól: egy hét múlva is számítani fog? Ha igen, beszéljük meg. Ha nem, engedd el. ❤️',
    sign: '– aki veled van, még dühösen is',
  },
  {
    emoji:'😑', seal:'🎨', topEmoji:'🌈',
    front: 'Nyisd ki, ha<br><em>unatkozol</em>',
    // FIX: "a jövőbeli önödnek" → "jövőbeli önmagadnak" (az "önöd" magázó/többes szám volt)
    text: 'Ötletek: ① Rajzolj valamit, ami ma eszedbe jutott. ② Írj egy rövid levelet a jövőbeli önmagadnak. <br> ③ Hívj fel, hátha ellérsz és el tudom mondani, mennnnnnnnnnyire szeretlek❤️ 🗺️',
    sign: '– a tervező',
  },
  {
    emoji:'🌸', seal:'💫', topEmoji:'👑',
    front: 'Nyisd ki, ha<br><em>gyönyörűnek érzed magad</em>, és akkor is ha épp nem - hiszen te mindig gyönyörű vagy!',
    // FIX: "elbűvölök tőled" → "elbűvölsz engem" (az "elbűvöl" tárgyas ige, a korábbi forma fordítva állt)
    text: 'IGEN! Igen, igen, igen. Mert ez nem csak ma igaz rád. A szemed, a mosolyod, Te Bombanőőő! Minden nap elbűvölsz. Őrizd meg ezt az érzést. 🌺',

    // "Mit mond a bal szem a jobb szemnek? »Köztünk szólva, te is látod ezt?«"

  },
  {

    front: 'Nyisd ki, ha<br><em>elveszettnek érzed magad</em>',
    // FIX: "növekedésben vagy" → "épp fejlődsz" (a korábbi szerkezet magyartalan volt)
    text: 'Az elveszettség sokszor csak azt jelzi, hogy éppen fejlődsz. Nem kell most mindent tudnod. Lélegezz, bízz magadban – és ha kell, szólj nekem. Együtt megtaláljuk az utat. 🌿',
    sign: '– aki melletted megy',

  {
    id: 'birthday',
    emoji:'🎂', seal:'🎁', topEmoji:'🥳',
    // FIX: "a születésnapodon van" → "ma a születésnapod van" (az ige alanya hiányzott)
    front: 'Nyisd ki, ha<br><em>ma van a születésnapod</em>',
    text: 'Boldog születésnapot, gyönyörű! 🎉 Ma minden rólad szól – a torta, a gyertyák, a kívánságok, minden. Kívánom neked az összes jót ezen a világon. Mert megérdemled. Szeretlek picim.❤️ 🎈',
    sign: '– a te legnagyobb rajongód',
  },
];

/* ── Detect touch ─────────────────────────────────── */
const isTouch = !window.matchMedia('(pointer: fine)').matches;

/* ── Birthday letter unlock date ──────────────────────
   The birthday letter stays sealed until this date/time, checked
   against the visitor's own device clock. This is a sweet
   surprise-lock for a personal gift, not a tamper-proof one.      */
const UNLOCK_DATE = new Date(2026, 5, 26, 0, 0, 0); // 2026.06.26 (month is 0-indexed)
const MEM_KEY = 'eszter_memories_unlocked';

/* ── Test mode (for YOU to check things, not for her) ─────────────
   Add these to the URL, never share them with her:
   ?forceUnlock=1     → pretend the unlock date already passed
   ?forceLocked=1     → pretend it's still locked (even after 06.26)
   ?resetMemories=1   → clears the "already revealed" flag so you
                         can replay the first-open popup + tab reveal
   Example for a full first-open test:
   index.html?forceUnlock=1&resetMemories=1                         */
const urlParams          = new URLSearchParams(window.location.search);
const TEST_FORCE_UNLOCK  = urlParams.get('forceUnlock') === '1';
const TEST_FORCE_LOCKED  = urlParams.get('forceLocked') === '1';
const TEST_RESET_MEMORIES = urlParams.get('resetMemories') === '1';
const TEST_MODE = TEST_FORCE_UNLOCK || TEST_FORCE_LOCKED || TEST_RESET_MEMORIES;

if (TEST_RESET_MEMORIES) localStorage.removeItem(MEM_KEY);

function isBirthdayUnlocked() {
  if (TEST_FORCE_UNLOCK) return true;
  if (TEST_FORCE_LOCKED) return false;
  return new Date() >= UNLOCK_DATE;
}
function daysUntilUnlock() {
  const diff = UNLOCK_DATE.getTime() - Date.now();
  return Math.max(0, Math.ceil(diff / 86400000));
}
function showTestBanner() {
  const flags = [];
  if (TEST_FORCE_UNLOCK)   flags.push('forceUnlock');
  if (TEST_FORCE_LOCKED)   flags.push('forceLocked');
  if (TEST_RESET_MEMORIES) flags.push('resetMemories');
  const bar = document.createElement('div');
  bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;' +
    'background:#222;color:#ffd166;font-family:monospace;font-size:.78rem;' +
    'text-align:center;padding:.35rem;letter-spacing:.02em;';
  bar.textContent = '🧪 TESZT MÓD aktív: ' + flags.join(', ') + ' — ezt az URL-t soha ne küldd el neki!';
  document.body.appendChild(bar);
}

/* ── "Our memories" gallery data ──────────────────────
   To add a real photo: put the image file next to this HTML file
   (e.g. inside a "photos" folder) and set img: 'photos/yourfile.jpg'.
   Leave img: '' to keep the soft placeholder box for now.         */
const memories = [
  { img: '', date: '', caption: 'Az első közös fotónk… 💕' },
  { img: '', date: '', caption: 'Az a nap, amikor megismertelek' },
  { img: '', date: '', caption: 'Egy kirándulás, amit sosem felejtek el' },
  { img: '', date: '', caption: 'Az a nevetés, amit imádok' },
  { img: '', date: '', caption: 'Egy csendes, boldog este kettőnknek' },
  { img: '', date: '', caption: 'És még sok, sok emlék jön… 💫' },
];

/* ── Render hero ──────────────────────────────────── */
function renderHero() {
  const t = i18n;
  document.getElementById('heroSub').innerHTML   = t.heroSub;
  document.getElementById('heroTitle').innerHTML = t.heroTitle;
  document.getElementById('heroHint').innerHTML  = t.heroHint + (isTouch ? t.hintTouch : t.hintMouse);
  document.getElementById('footerText').textContent = t.footer;
}

/* ── Render cards ─────────────────────────────────── */
function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const t = i18n;

  letters.forEach((l) => {
    const card = document.createElement('div');
    const locked = l.id === 'birthday' && !isBirthdayUnlocked();
    card.className = 'card' + (locked ? ' locked-card' : '');

    const lockBadge     = locked ? `<div class="lock-badge">🔒</div>` : '';
    const lockCountdown = locked
      ? `<div class="locked-countdown">${t.lockedUntil}<br>${t.lockedDays(daysUntilUnlock())}</div>`
      : '';

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front${locked ? ' locked-front' : ''}">
          ${lockBadge}
          <div class="envelope-wrap">
            <div class="envelope-icon">${locked ? '🔒' : '💌'}</div>
            <div class="wax-seal">${l.seal}</div>
          </div>
          <div class="card-label-open">${l.emoji}</div>
          <div class="card-label">${l.front}</div>
          ${lockCountdown}
        </div>
        <div class="card-back">
          <div class="letter-emoji">${l.topEmoji}</div>
          <p class="letter-text">${l.text}</p>
          <div class="letter-sign">${l.sign}</div>
        </div>
      </div>`;

    if (locked) {
      // Still sealed — a little shake instead of opening, no peeking allowed.
      card.addEventListener('click', () => {
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 500);
      });
    } else if (isTouch) {
      card.addEventListener('click', () => {
        const wasOpen = card.classList.contains('open');
        card.classList.toggle('open', !wasOpen);
        if (!wasOpen) spawnSparkles(card);
        else if (l.id === 'birthday') handleBirthdayClose();
      });
    } else {
      card.addEventListener('mouseenter', () => card.classList.add('open'));
      card.addEventListener('mouseleave', () => {
        const wasOpen = card.classList.contains('open');
        card.classList.remove('open');
        if (wasOpen && l.id === 'birthday') handleBirthdayClose();
      });
    }

    grid.appendChild(card);
  });
}

/* ── Memories tab & popup ─────────────────────────── */
function renderMemories() {
  const t = i18n;
  document.getElementById('memSub').innerHTML        = t.memSub;
  document.getElementById('memTitle').innerHTML      = t.memTitle;
  document.getElementById('memHint').textContent     = t.memHint;
  document.getElementById('memFooterText').textContent = t.memFooter;

  const grid = document.getElementById('memoriesGrid');
  grid.innerHTML = '';
  memories.forEach((m) => {
    const card = document.createElement('div');
    card.className = 'memory-card';
    card.innerHTML = `
      <div class="memory-photo">
        ${m.img
          ? `<img src="${m.img}" alt="">`
          : `<div class="memory-placeholder"><span class="ph-icon">📷</span><span class="ph-text">${t.phText}</span></div>`}
      </div>
      <p class="memory-caption">${m.caption}</p>
      ${m.date ? `<p class="memory-date">${m.date}</p>` : ''}`;
    grid.appendChild(card);
  });
}

function revealTabBar(animate) {
  const bar = document.getElementById('tabBar');
  bar.style.display = 'flex';
  if (animate) {
    bar.classList.add('tab-reveal');
    setTimeout(() => bar.classList.remove('tab-reveal'), 700);
  }
  renderMemories();
}

function handleBirthdayClose() {
  if (!isBirthdayUnlocked()) return;
  if (localStorage.getItem(MEM_KEY)) return; // already revealed before — no repeat popup
  localStorage.setItem(MEM_KEY, '1');
  revealTabBar(true);
  showPopup();
}

function showPopup() {
  const t = i18n;
  document.getElementById('popupTitle').textContent = t.popupTitle;
  document.getElementById('popupText').textContent  = t.popupText;
  document.getElementById('popupBtn').textContent   = t.popupBtn;
  document.getElementById('popupOverlay').style.display = 'flex';
}

function goToMemoriesFromPopup() {
  document.getElementById('popupOverlay').style.display = 'none';
  showMemories();
}

function showMemories() {
  document.getElementById('mainView').style.display     = 'none';
  document.getElementById('memoriesView').style.display  = 'block';
  document.getElementById('tabLetters').classList.remove('active');
  document.getElementById('tabMemories').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showMain() {
  document.getElementById('memoriesView').style.display = 'none';
  document.getElementById('mainView').style.display     = 'block';
  document.getElementById('tabMemories').classList.remove('active');
  document.getElementById('tabLetters').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── Sparkles ─────────────────────────────────────── */
function spawnSparkles(card) {
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  const glyphs = ['✨','💖','🌸','⭐','💫','🌟','🩷','🌺','💕'];
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
    const angle = (i / 10) * 2 * Math.PI + Math.random() * .4;
    const dist  = 55 + Math.random() * 55;
    s.style.setProperty('--tx', `${Math.cos(angle)*dist}px`);
    s.style.setProperty('--ty', `${Math.sin(angle)*dist}px`);
    s.style.left  = `${cx}px`;
    s.style.top   = `${cy}px`;
    s.style.animationDelay = `${Math.random() * .1}s`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}

/* ── Floating petals ──────────────────────────────── */
const petalBox    = document.getElementById('petals');
const petalGlyphs = ['🌸','🌺','💮','🌷','✿','❀','🩷','💕','🌼','✨'];
function makePetal() {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = petalGlyphs[Math.floor(Math.random() * petalGlyphs.length)];
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (6 + Math.random() * 10) + 's';
  p.style.animationDelay    = (Math.random() * 8) + 's';
  p.style.fontSize = (.65 + Math.random() * .8) + 'rem';
  petalBox.appendChild(p);
  setTimeout(() => p.remove(), 20000);
}
for (let i = 0; i < 22; i++) setTimeout(makePetal, i * 380);
setInterval(makePetal, 1700);

/* ── Init ─────────────────────────────────────────── */
renderHero();
renderCards();
if (localStorage.getItem(MEM_KEY)) {
  revealTabBar(false); // already unlocked on a previous visit — show without the reveal animation
}
if (TEST_MODE) showTestBanner();
</script>
